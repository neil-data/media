services:
  # Your Backend Service
  - type: web
    name: deadsat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: N2YO_API_KEY
        sync: false
      - key: SATNOGS_TOKEN
        sync: false
      - key: TARGET_NORAD
        value: "57166"
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health

  # Your Frontend Service (Add this right underneath)
  - type: web
    name: deadsat-frontend
    runtime: static
    rootDir: remix_-orbital-recovery-unit
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_WS_URL
        # Once your backend deploys, put its Render URL here (use wss:// instead of https://)
        value: "wss://deadsat-backend.onrender.com"
    routes:
      # This forces Render to route all paths to index.html so React Router doesn't 404
      - type: rewrite
        source: /*
        destination: /index.html
