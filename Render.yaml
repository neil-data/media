services:
  - type: web
    name: deadsat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: N2YO_API_KEY
        sync: false
      - key: SATNOGS_TOKEN
        sync: false
      - key: TARGET_NORAD
        value: "57166"
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
